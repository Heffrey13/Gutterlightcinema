<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Lost & Found Archive</title>

  <link
    rel="stylesheet"
    href="../assets/css/style.css"
  >

  <style>
    body {
      align-items: flex-start;
    }

    .archive-container {
      width: min(92vw, 900px);
      margin: 0 auto;
    }

    .archive-list {
      display: grid;
      gap: 18px;
      width: 100%;
      margin-top: 30px;
    }

    .item {
      width: 100%;
      border: 1px solid #333;
      padding: clamp(18px, 3vw, 24px);
      background: rgba(255, 255, 255, 0.02);
      text-align: left;

      transition:
        border-color 0.2s ease,
        background 0.2s ease,
        transform 0.2s ease;
    }

    .item:hover {
      border-color: #777;
      background: rgba(255, 255, 255, 0.05);
      transform: translateY(-2px);
    }

    .item a {
      display: block;
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 0;
      border: none;
      background: transparent;
      color: white;
      text-decoration: none;
      text-align: left;
    }

    .item a:hover {
      background: transparent;
      color: white;
      box-shadow: none;
    }

    .item-number {
      display: block;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .item-title {
      display: block;
      margin-bottom: 8px;
      font-size: clamp(1.05rem, 2.5vw, 1.25rem);
    }

    .item-status {
      display: block;
      color: #aaa;
      font-size: 0.95rem;
    }

    .missing {
      color: #555;
      border-color: #222;
    }

    .missing .item-status {
      color: #555;
    }

    .redacted-file {
      border-color: #5b1f1f;
      background: rgba(100, 0, 0, 0.08);
    }

    .redacted-file .item-number,
    .redacted-file .item-title {
      color: #d7b0b0;
    }

    .return-link {
      margin-top: 30px;
    }

    @media (min-width: 700px) {
      .archive-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .item:first-child {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>

<body>

  <main class="archive-container">

    <div class="container">

      <h1>LOST & FOUND</h1>

      <p>Recovered Items</p>

      <hr>

      <div class="archive-list">

        <div class="item">

          <a href="/archive/001/">

            <strong class="item-number">
              ITEM #001
            </strong>

            <span class="item-title">
              Gutterlight Cinema
            </span>

            <span
              id="item001Status"
              class="item-status"
            >
              Status: Awaiting Recovery
            </span>

          </a>

        </div>

        <div class="item missing">

          <strong class="item-number">
            ITEM #002
          </strong>

          <span class="item-title">
            Missing
          </span>

          <span class="item-status">
            Status: Unrecovered
          </span>

        </div>

        <div class="item missing">

          <strong class="item-number">
            ITEM #003
          </strong>

          <span class="item-title">
            Missing
          </span>

          <span class="item-status">
            Status: Unrecovered
          </span>

        </div>

        <div
          id="redactedFile"
          class="item redacted-file"
          hidden
        >

          <strong class="item-number">
            FILE // ███████
          </strong>

          <span class="item-title">
            [REDACTED]
          </span>

          <span class="item-status">
            Status: Newly Indexed
          </span>

        </div>

      </div>

      <a
        class="return-link"
        href="/"
      >
        Return to Entrance
      </a>

    </div>

  </main>

  <script src="../assets/js/atmosphere.js?v=2"></script>

  <script>
    const item001Status =
      document.getElementById("item001Status");

    const redactedFile =
      document.getElementById("redactedFile");

    const itemRecovered =
      localStorage.getItem("item001Recovered");

    const redactedUnlocked =
      localStorage.getItem("redacted001Unlocked");

    if (itemRecovered === "true") {
      item001Status.textContent =
        "Status: Recovered";
    }

    if (redactedUnlocked === "true") {
      redactedFile.hidden = false;
    }
  </script>

</body>

</html>
