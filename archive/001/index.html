<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Recovered Artifact #001</title>

  <link
    rel="stylesheet"
    href="../../assets/css/style.css"
  >
</head>

<body>

  <div class="container">

    <h1>ITEM #001</h1>

    <p><strong>Recovered Artifact</strong></p>

    <hr>

    <p><strong>Gutterlight Cinema</strong></p>

    <p>
      The required recovery phrase should be
      present on the recovered artifact.
    </p>

    <form id="recoveryForm">

      <input
        id="pw"
        name="recoveryPhrase"
        type="password"
        placeholder="Awaiting Input..."
        autocomplete="off"
        enterkeyhint="go"
      >

      <br><br>

      <button type="submit">
        Recover Item
      </button>

    </form>

    <p id="error"></p>

  </div>

  <script src="../../assets/js/recover.js?v=16"></script>
  <script src="../../assets/js/atmosphere.js?v=1"></script>

  <script>
    const recoveryForm =
      document.getElementById("recoveryForm");

    const passwordField =
      document.getElementById("pw");

    recoveryForm.addEventListener(
      "submit",
      function (event) {
        event.preventDefault();

        recover(
          "projectionist",
          "recovered.html"
        );
      }
    );

    window.addEventListener(
      "load",
      function () {
        passwordField.focus();
      }
    );
  </script>

</body>

</html>
