<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Recovered Artifact #001</title>

  <link
    rel="stylesheet"
    href="../../assets/css/style.css"
  >

  <style>
    .status-panel {
      display: none;
      margin-top: 24px;
    }

    .status-panel.is-visible {
      display: block;
    }

    .status-label {
      display: block;
      margin-bottom: 8px;
      color: #777;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .status-value {
      display: block;
      margin-bottom: 22px;
      color: white;
      font-size: 1.1rem;
    }

    .recovery-panel.is-hidden {
      display: none;
    }

    .view-file-link {
      margin-top: 0;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>ITEM #001</h1>

    <p><strong>Recovered Artifact</strong></p>

    <hr>

    <p><strong>Gutterlight Cinema</strong></p>

    <section
      id="recoveryPanel"
      class="recovery-panel"
    >

      <p>
        The required recovery phrase should be
        present on the recovered artifact.
      </p>

      <form id="recoveryForm">

        <input
          id="pw"
          name="recoveryPhrase"
          type="password"
          placeholder="Awaiting Input..."
          autocomplete="off"
          enterkeyhint="go"
        >

        <br><br>

        <button type="submit">
          Recover Item
        </button>

      </form>

      <p id="error"></p>

    </section>

    <section
      id="statusPanel"
      class="status-panel"
    >

      <span class="status-label">
        Status
      </span>

      <strong class="status-value">
        Recovered
      </strong>

      <a
        class="view-file-link"
        href="recovered.html"
      >
        View File
      </a>

    </section>

  </div>

  <script src="../../assets/js/recover.js?v=17"></script>
  <script src="../../assets/js/atmosphere.js?v=2"></script>

  <script>
    const recoveryPanel =
      document.getElementById("recoveryPanel");

    const statusPanel =
      document.getElementById("statusPanel");

    const recoveryForm =
      document.getElementById("recoveryForm");

    const passwordField =
      document.getElementById("pw");

    const itemRecovered =
      localStorage.getItem("item001Recovered") === "true";

    function showRecoveredState() {
      recoveryPanel.classList.add("is-hidden");
      statusPanel.classList.add("is-visible");
    }

    if (itemRecovered) {
      showRecoveredState();
    } else {
      recoveryForm.addEventListener(
        "submit",
        function (event) {
          event.preventDefault();

          recover(
            "projectionist",
            "recovered.html"
          );
        }
      );

      window.addEventListener(
        "load",
        function () {
          passwordField.focus();
        }
      );
    }
  </script>

</body>

</html>
